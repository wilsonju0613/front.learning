<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <meta charset="utf-8"/>
        <title>JavaScript 變數、常數 </title>
    </head>
    <body>
        <script>
            //宣告變數:let 變數名稱
            let x;
            console.log(x);
            x=10; //把資料放入變數x
            console.log(x);
            x=true;
            console.log(x);
            x=null;
            console.log(x);

            let abc="hello";
            console.log(abc);

            //常數
            const z=100;
            console.log(z);
        </script>
    </body>

</html>
