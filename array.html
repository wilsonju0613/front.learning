            //利用for迴圈，逐一取的陣列中的資料
            //算平均數 先算總和
            let grades=[];
            grades.push(70);
            grades.push(50);
            grades.push(84);
            let total=0;
            for(let i=0;i<grades.length;i++){
                total+=grades[i];
            }
            let avg=total/grades.length;
            console.log(total);
            console.log(avg);

        </script>
