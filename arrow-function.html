<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <meta charset="utf-8"/>
        <title>箭頭函數 arrow function</title>
    </head>
    <body>
        <script>
            /*
            //計算1+2+...+10
            function calculate(max){
                let result=0;
                let n=1;
                while(n<=max){
                    result+=n;
                    n++;
                }
                // console.log(result);
                return result;
            }
            */
            //箭頭函式建立
            let calculate=(max)=>{
                let result=0;
                let n=1;
                while(n<=max){
                    result+=n;
                    n++;
                }
                // console.log(result);
                return result;
            };
            //呼叫函式
            let ans1=calculate(10);
            let ans2=calculate(20);
            console.log(ans1,ans2);
            /*
            //乘法箭頭函式
            let multiply=(n1,n2)=>{
                return n1*n2;
            };
            */
            let multiply=(n1,n2)=>(n1*n2); //簡化箭頭函式
            let ans=multiply(3,4);
            console.log(ans);
        </script>
    </body>
</html>
