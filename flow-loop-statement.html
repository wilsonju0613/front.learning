<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <meta charset="utf-8"/>
        <title>Javascript 流程控制:迴圈指令</title>
    </head>
    <body>
        <script>
            /*
            //break指令
            let n=0;
            while(n<5){
                if(n==3){
                    break; //n=3時強迫結束
                };
                console.log(n);
                n++;
            }
            */
            //continue指令
            for(let n=0;n<5;n++){
                if(n==3){
                    continue; //把3跳過
                }
                console.log(n);
            }
        </script>
    </body>
</html>
